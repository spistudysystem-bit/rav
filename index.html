
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>HOUSE OF RAV :: MISSION CONTROL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
      :root {
        --accent-gold: #d4af37;
        --midnight: #000000;
      }
      body {
        font-family: 'Inter', sans-serif;
        background-color: #000;
        margin: 0;
        padding: 0;
        color: #e2e8f0;
        overflow-x: hidden;
        -webkit-tap-highlight-color: transparent;
      }
      .font-tech {
        font-family: 'Orbitron', sans-serif;
      }
      /* Improved Scrollbar for touch devices */
      .custom-scrollbar::-webkit-scrollbar {
        width: 4px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.5);
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: rgba(217, 182, 92, 0.3);
        border-radius: 10px;
      }
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
      .glass-card {
        background: linear-gradient(135deg, rgba(15, 23, 42, 0.5) 0%, rgba(15, 23, 42, 0.2) 100%);
        backdrop-filter: blur(24px);
        border: 1px solid rgba(255, 255, 255, 0.05);
        box-shadow: 0 8px 64px -12px rgba(0, 0, 0, 0.8);
      }
      @keyframes energy-flow {
        0% { transform: translateX(-100%); }
        100% { transform: translateX(100%); }
      }
      .noise {
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        background: url('https://grainy-gradients.vercel.app/noise.svg');
        opacity: 0.1;
        pointer-events: none;
        z-index: 50;
      }
      /* Prevent accidental text selection on UI elements */
      button, .font-tech {
        user-select: none;
      }
      /* Smooth transitions for all scale transforms */
      * {
        transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
      }
    </style>

  }
}
</script>

</head>

</body>
</html>
